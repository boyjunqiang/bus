<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一分钟危机 - 2D横版探索</title>
    <!-- 引入 Google Fonts 现代字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 爆炸闪光特效层 -->
    <div id="explosion-layer" class="hidden"></div>

    <!-- 主菜单 -->
    <div id="main-menu" class="view-container active">
        <div class="menu-content">
            <h1 class="game-title">60秒<span>危机</span></h1>
            <p class="subtitle">第一章：末班公交车</p>
            <button id="start-btn" class="primary-btn">开始循环</button>
            <div class="rules">
                <h3>规则：</h3>
                <p>1. 键盘 A/D 或 左/右箭头 控制移动。</p>
                <p>2. 走近乘客，鼠标悬停并点击进行搜查。</p>
                <p>3. 找出炸弹客并“指认”他。</p>
                <p>4. 你的记忆不会随着爆炸重置。</p>
            </div>
        </div>
    </div>

    <!-- 游戏关卡界面 -->
    <div id="game-level" class="view-container hidden">
        
        <!-- 顶部计时器和提示信息 -->
        <div class="header">
            <div class="timer-container">
                <span id="timer">60:00</span>
            </div>
            <div id="proximity-hint" class="hint-text hidden">距离足够，点击搜查</div>
        </div>

        <!-- 2D 游戏世界视口 -->
        <div class="viewport">
            <!-- 远景：云层 -->
            <div class="cloud-layer"></div>
            <!-- 中景：飞速掠过的树影 -->
            <div class="tree-layer"></div>
            <!-- 近景马路：飞驰而过的其他车辆 -->
            <div class="traffic-layer">
                <div class="passing-car car1">
                    <div class="car-wheel" style="left: 70px;"></div>
                    <div class="car-wheel" style="right: 70px;"></div>
                </div>
                <div class="passing-car car2">
                    <div class="car-wheel" style="left: 80px;"></div>
                    <div class="car-wheel" style="right: 80px;"></div>
                </div>
                <div class="passing-car car3">
                    <div class="car-wheel" style="left: 70px;"></div>
                    <div class="car-wheel" style="right: 70px;"></div>
                </div>
            </div>

            <div id="game-world" class="bus-interior">
                <!-- 车厢两端的玻璃，防止看起来像是隔空的 -->
                <div class="end-glass" style="left: 0; border-radius: 20px 0 0 20px;"></div>
                <div class="end-glass" style="right: 0; border-radius: 0 20px 20px 0;"></div>

                <!-- 装饰：车窗与窗外风景 -->
                <div class="window" style="left: 150px;"></div>
                <div class="window" style="left: 450px;"></div>
                <div class="window" style="left: 750px;"></div>
                <div class="window" style="left: 1050px;"></div>
                <div class="window" style="left: 1350px;"></div>

                <!-- 装饰：公交车扶手杆 -->
                <div class="pole" style="left: 200px;"></div>
                <div class="pole" style="left: 600px;"></div>
                <div class="pole" style="left: 900px;"></div>
                <div class="pole" style="left: 1200px;"></div>
                <div class="pole" style="left: 1500px;"></div>
                <div class="handrail"></div>

                <!-- 司机区域 (车头，左侧) -->
                <div class="driver-cabin" style="left: 0px;">
                    <div class="steering-wheel"></div>
                    <div class="driver">🧑‍✈️</div>
                </div>

                <!-- 司机座位 (朝左) -->
                <div class="seat driver-seat" style="left: 60px;"></div>

                <!-- 装饰：座位 -->
                <div class="seat" style="left: 380px;"></div>
                <div class="seat" style="left: 780px;"></div>
                <div class="seat" style="left: 1180px;"></div>
                <div class="seat" style="left: 1480px;"></div>

                <!-- 公交车轮子与粒子特效 -->
                <div class="wheel" style="left: 200px;"></div>
                <div class="dust-trail" style="left: 200px;"></div>
                
                <div class="wheel" style="left: 1200px;"></div>
                <div class="dust-trail" style="left: 1200px;"></div>

                <!-- 玩家控制的角色 -->
                <div id="player" class="entity player-char">
                    <div class="player-sprite">我</div>
                </div>

                <!-- 乘客将由 JS 动态生成并注入到此容器中 -->
                <div id="entities-container"></div>
            </div>
        </div>

        <!-- 底部：线索笔记本 (跨循环继承) -->
        <div class="notebook">
            <h3><span class="icon">📓</span> 调查笔记 (记忆保留)</h3>
            <ul id="clue-list">
                <li class="empty-clue">暂无线索...</li>
            </ul>
        </div>

        <!-- 弹出交互框 -->
        <div id="dialog-overlay" class="hidden">
            <div class="dialog-box glass-panel">
                <!-- 默认选项视图 -->
                <div id="dialog-default-view">
                    <h2 id="dialog-name">乘客名字</h2>
                    <p id="dialog-text">乘客说的话或者你观察到的细节...</p>
                    
                    <!-- 操作选项 -->
                    <div class="actions">
                        <button class="action-btn" id="action-investigate">搜查 (-5秒)</button>
                        <button class="action-btn" id="action-interrogate">盘问对话</button>
                        <button class="action-btn accust-btn" id="action-accuse">指认炸弹客！</button>
                        <button class="action-btn cancel-btn" id="action-close">离开</button>
                    </div>
                </div>

                <!-- 盘问对话/聊天视图 -->
                <div id="dialog-chat-view" class="hidden">
                    <h2 id="chat-name">乘客名字</h2>
                    <div class="chat-container">
                        <div id="chat-history">
                            <!-- 聊天记录动态插入 -->
                        </div>
                        <div id="chat-loading" class="hidden">
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                        </div>
                    </div>
                    
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="输入你想问的问题..." autocomplete="off" />
                        <button id="chat-send-btn">发送 (-5秒)</button>
                    </div>

                    <div class="chat-footer">
                        <button class="action-btn" id="chat-back-btn">返回</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 失败/爆炸后提示框 -->
        <div id="reset-overlay" class="hidden">
            <div class="reset-box glass-panel">
                <h2>时间到了...</h2>
                <p>公交车化为了灰烬。</p>
                <button id="restart-loop-btn" class="primary-btn">意识重启</button>
            </div>
        </div>
        
        <!-- 胜利提示框 -->
        <div id="victory-overlay" class="hidden">
            <div class="victory-box glass-panel">
                <h2>危机解除！</h2>
                <p>你成功夺下炸弹扔出了窗外。循环打破了。</p>
                <button id="back-menu-btn" class="primary-btn">返回主菜单</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
